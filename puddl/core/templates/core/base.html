{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} {% endblock %} | Puddle</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <header class="bg-white">
      <div
        class="mx-auto flex h-16 max-w-7xl items-center gap-8 px-4 sm:px-6 lg:px-8"
      >
        <div class="flex flex-1 items-center justify-end md:justify-between">
          <nav aria-label="Global" class="hidden md:block">
            <ul class="flex items-center gap-6 text-xl font-semibold">
              <li>
                <a
                  class="text-gray-500 transition hover:text-gray-500/75"
                  href="#"
                >
                  Puddle
                </a>
              </li>

              <li>
                <a
                  class="text-gray-500 transition hover:text-gray-500/75"
                  href="#"
                >
                  New-Items
                </a>
              </li>

              <li>
                <a
                  class="text-gray-500 transition hover:text-gray-500/75"
                  href="#"
                >
                  Browse
                </a>
              </li>
            </ul>
          </nav>

          <div class="flex items-center gap-4">
            <div class="sm:flex sm:gap-4">
              <a
                class="block rounded-md bg-teal-600 px-5 py-2.5 text-sm font-medium text-white transition hover:bg-teal-700"
                href="#"
              >
                Login
              </a>

              <a
                class="hidden rounded-md bg-gray-100 px-5 py-2.5 text-sm font-medium text-teal-600 transition hover:text-teal-600/75 sm:block"
                href="#"
              >
                Register
              </a>
            </div>

            <button
              class="block rounded-sm bg-gray-100 p-2.5 text-gray-600 transition hover:text-gray-600/75 md:hidden"
            >
              <span class="sr-only">Toggle menu</span>
              <svg
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                class="size-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="px-16 py-16">
      <h1>Welcome TO</h1>
      {% block content %} {% endblock %}
    </div>


    {% comment %} Footer Section {% endcomment %}
    <footer class="bg-white">
  <div class="mx-auto max-w-7xl space-y-8 px-4 py-16 sm:px-6 lg:space-y-16 lg:px-8">
   
    
       
         

    <div
      class="grid grid-cols-1 gap-8 border-t border-gray-100 pt-8 sm:grid-cols-2 lg:grid-cols-4 lg:pt-16"
    >
      


      <div>
        <p class="font-medium text-gray-900">Helpful Links</p>

        <ul class="mt-6 space-y-4 text-sm">
          <li>
            <a href="{% url 'contact_page' %}" class="text-gray-700 transition hover:opacity-75"> Contact </a>
          </li>

          <li>
            <a href="#" class="text-gray-700 transition hover:opacity-75"> FAQs </a>
          </li>

          <li>
            <a href="#" class="text-gray-700 transition hover:opacity-75"> Live Chat </a>
          </li>
        </ul>
      </div>

      

    <p class="text-xs text-gray-500">&copy; 2022. Company Name. All rights reserved.</p>
  </div>
</footer>
  </body>
</html>
